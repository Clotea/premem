    });
    render();

function createSvg(label, height = 440) {
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("viewBox", `0 0 1000 ${height}`);
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", label);
  const defs = document.createElementNS(svgNS, "defs");
  defs.innerHTML = `
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--muted-foreground)"></path>
    </marker>
    <marker id="arrow-graph" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--series-2)"></path>
    </marker>`;
  svg.appendChild(defs);
  return svg;
}

function el(name, attrs = {}, text = "") {
  const node = document.createElementNS(svgNS, name);
  Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, String(value)));
  if (text) node.textContent = text;
  return node;
}

function setLegend(items) {
  const legend = document.getElementById("legend");
  legend.innerHTML = "";
  items.forEach(item => {
    const span = document.createElement("span");
    span.style.setProperty("--legend-color", item.color);
    span.textContent = item.label;
    legend.appendChild(span);
  });
}

function render() {
  const controls = document.getElementById("secondaryControls");
  const plot = document.getElementById("plot");
  controls.innerHTML = "";
  plot.innerHTML = "";
  document.getElementById("detail").innerHTML = "";
  if (state.mode === "diagnosis") renderDiagnosis(controls, plot);
  if (state.mode === "evidence") renderEvidence(controls, plot);
  if (state.mode === "timeline") renderTimeline(controls, plot);
  if (state.mode === "graph") renderGraph(controls, plot);
  if (state.mode === "route") renderRoute(controls, plot);
  if (state.mode === "compression") renderCompression(controls, plot);
}

function renderDiagnosis(controls, plot) {
  const predictionIds = new Set(

    (trace.prepared_context.executed_paths || [])

function renderTimeline(controls, plot) {
  const stages = [
    ...trace.stage_timings.filter(item => item.stage_id !== "prepared_context"),
    ...trace.planning_stages
  ];
  const maxMs = Math.max(...stages.map(item => Number(item.elapsed_ms)), 1);
  const svg = createSvg("Planning stage latency timeline", 44 + stages.length * 38);
  stages.forEach((stage, index) => {
    const y = 30 + index * 38;
    const width = Math.max(2, 650 * Number(stage.elapsed_ms) / maxMs);
    svg.appendChild(el("text", { x: 8, y: y + 13, class: "node-label" }, stageLabels[stage.label] || stage.label));
    svg.appendChild(el("rect", { x: 300, y, width: 650, height: 18, rx: 5, class: "bar-bg" }));
    svg.appendChild(el("rect", { x: 300, y, width, height: 18, rx: 5, class: "timeline-bar" }));
    svg.appendChild(el("text", { x: Math.min(960, 308 + width), y: y + 13, class: "annotation" },
      `${Number(stage.elapsed_ms).toFixed(1)} ms`));
  });
  plot.appendChild(svg);
  const calls = trace.llm_calls;
  const totalTokens = calls.reduce((sum, call) => sum + Number(call.usage.total_tokens || 0), 0);
  document.getElementById("detail").innerHTML =
    `<strong>${calls.length} 次 vLLM 调用</strong> · ${totalTokens.toLocaleString()} tokens · ` +
    `图构建属于离线/空闲阶段；当前预测与规划共耗时 ${(trace.runtime.total_planning_ms / 1000).toFixed(2)} 秒。`;
  setLegend([{ label: "实际墙钟耗时", color: "var(--series-1)" }]);
}

function renderGraph(controls, plot) {
  trace.graph.evolution.forEach((stage, index) => {
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = graphStageLabel(stage.stage_id);
    button.setAttribute("aria-pressed", String(index === state.graphStage));
    button.addEventListener("click", () => { state.graphStage = index; render(); });
    controls.appendChild(button);
  });
  const stage = trace.graph.evolution[state.graphStage];
  const allNodes = memoryById;
  const priority = node => {
    const flags = node.flags || {};
    return (flags.gold ? 1000 : 0) + (flags.prepared ? 500 : 0) +
      (flags.candidate ? 200 : 0) + (flags.predicted ? 100 : 0) + Number(node.timestamp || 0) / 1000;
  };
  const groups = {};
  stage.node_ids.forEach(id => {
    const node = allNodes.get(id);
    if (!node) return;
    (groups[node.node_type] ||= []).push(node);
  });
  Object.values(groups).forEach(nodes => nodes.sort((a, b) => priority(b) - priority(a)));
  const sampled = Object.values(groups).flatMap(nodes => nodes.slice(0, 18));
  const sampledIds = new Set(sampled.map(node => node.id));
  const positions = layeredPositions(sampled, 1000, 410);
  const edgeIndices = new Set(stage.edge_indices);
  const addedEdges = new Set(stage.added_edge_indices);
  const svg = createSvg(`${stage.label}: ${stage.node_count} nodes and ${stage.edge_count} edges`, 430);
  trace.graph.edges.forEach(edge => {
    if (!edgeIndices.has(edge.index) || !sampledIds.has(edge.source) || !sampledIds.has(edge.target)) return;
    const a = positions[edge.source], b = positions[edge.target];
    svg.appendChild(el("line", {
      x1: a.x, y1: a.y, x2: b.x, y2: b.y,
      class: addedEdges.has(edge.index) ? "edge edge-new" : "edge"
    }));
  });
  const addedNodes = new Set(stage.added_node_ids);
  sampled.forEach(node => {
    const p = positions[node.id];
    const flags = node.flags || {};
    const classes = ["node"];
    if (addedNodes.has(node.id)) classes.push("node-new");
    if (flags.gold) classes.push("node-gold");
    svg.appendChild(el("circle", {
      cx: p.x, cy: p.y,
      r: flags.prepared ? 8 : 6,
      fill: typeColor[node.node_type] || "var(--muted-foreground)",
      class: classes.join(" ")
    }));
    if (flags.prepared || flags.gold) {
      svg.appendChild(el("text", { x: p.x + 10, y: p.y + 4, class: "semantic-node-label" },
        shortText(localized(node.summary), 28)));
    }
  });
  Object.entries(positions.columns).forEach(([type, x]) => {
    svg.appendChild(el("text", { x, y: 18, class: "axis-label", "text-anchor": "middle" }, nodeTypeLabel(type)));
  });
  plot.appendChild(svg);
  const semanticRows = sampled
    .filter(node => node.flags?.prepared || node.flags?.gold)
    .map(node => ({
      status: node.flags?.gold && node.flags?.prepared
        ? "GOLD 命中"
        : node.flags?.gold
          ? "GOLD 未命中"
          : "已准备",
      statusClass: node.flags?.gold && node.flags?.prepared
        ? "status-hit"
        : node.flags?.gold
          ? "status-miss"
          : "status-prepared",
      role: node.node_type,
      summary: localized(node.summary)
    }));
  appendSemanticTable(plot, semanticRows);
  document.getElementById("detail").innerHTML =
    `<strong>${graphStageLabel(stage.stage_id)}</strong> · ${stage.node_count} 节点 / ${stage.edge_count} 边 · ` +
    `每种类型最多展示 18 个节点，并优先保留 Gold 与 prepared memory。`;
  setLegend([
    { label: "对话轮次", color: typeColor.TurnNode },
    { label: "会话段", color: typeColor.SegmentNode },
    { label: "记忆", color: typeColor.MemoryNode },
    { label: "实体", color: typeColor.EntityNode },
    { label: "Gold 轮廓", color: "var(--series-4)" },
    { label: "本阶段新增", color: "var(--series-3)" }
  ]);
}

function layeredPositions(nodes, width, height) {
  const order = ["TurnNode", "SegmentNode", "MemoryNode", "EntityNode"];
  const groups = {};
  nodes.forEach(node => (groups[node.node_type] ||= []).push(node));
  const present = order.filter(type => groups[type]?.length);
  const columns = {};
  present.forEach((type, index) => columns[type] = 70 + index * ((width - 140) / Math.max(1, present.length - 1)));
  const positions = { columns };
  present.forEach(type => {
    const list = groups[type];
    list.forEach((node, index) => {
      positions[node.id] = {
        x: columns[type],
        y: 42 + index * ((height - 64) / Math.max(1, list.length - 1))
      };
    });
  });
  return positions;
}

function renderRoute(controls, plot) {
  const paths = trace.prepared_context.executed_paths || [];
  if (!paths.length) {
    plot.innerHTML = `<div class="empty">没有选择 Meta-path。</div>`;
    setLegend([]);
    return;
  }
  const label = document.createElement("label");
  label.textContent = "当前路径 ";
  const select = document.createElement("select");
  paths.forEach((path, index) => {
    const option = document.createElement("option");
    option.value = String(index);
    option.textContent = `${path.path_id}: ${String(path.path || "").split("->").map(item => ontologyLabel(item.trim())).join(" → ")}`;
    option.selected = index === state.pathIndex;
    select.appendChild(option);
  });
  select.addEventListener("change", () => { state.pathIndex = Number(select.value); render(); });
  label.appendChild(select);
  controls.appendChild(label);

  const path = paths[state.pathIndex] || paths[0];
  const conceptual = String(path.path || "").split("->").map(item => ontologyLabel(item.trim()));
  const actual = [
    { label: "预测意图", kind: "plain" },
    { label: `全库记忆排名（${path.ranking?.length || 0}）`, kind: "rank" },
    { label: `Top-k 记忆（${path.selected_memory_ids.length}）`, kind: "rank" },
    { label: `邻接局部子图（${path.node_count} 节点）`, kind: "graph" }
  ];
  const svg = createSvg(`${path.path_id} conceptual path compared with actual execution`, 420);
  svg.appendChild(el("text", { x: 8, y: 42, class: "node-label" }, "概念 Meta-path"));
  drawLane(svg, conceptual.map(label => ({ label, kind: "plain" })), 86, false);
  svg.appendChild(el("text", { x: 8, y: 205, class: "node-label" }, "代码真实执行路径"));
  drawLane(svg, actual, 250, true);
  svg.appendChild(el("text", { x: 500, y: 348, class: "annotation", "text-anchor": "middle" },
    "只有最后的局部展开真正使用物理图边"));
  svg.appendChild(el("text", { x: 500, y: 376, class: "annotation", "text-anchor": "middle" },
    `选中 ${path.selected_memory_ids.length} 条路径候选记忆`));
  plot.appendChild(svg);
  const selectedRanks = (path.ranking || []).filter(item => item.selected);
  appendSemanticTable(
    plot,
    selectedRanks.map(item => ({
      status: goldIds.has(item.memory_id)
        ? "GOLD"
        : preparedIds.has(item.memory_id)
          ? "已准备"
          : "仅路径候选",
      statusClass: goldIds.has(item.memory_id)
        ? "status-hit"
        : preparedIds.has(item.memory_id)
          ? "status-prepared"
          : "",
      role: `排名 ${item.rank} · 分数 ${Number(item.score).toFixed(3)}`,
      summary: localized(item.summary)
    }))
  );
  document.getElementById("detail").innerHTML =
    `<strong>${path.path_id} 选择原因：</strong>${escapeHtml(localized(path.reason || ""))}`;
  setLegend([
    { label: "文本排名步骤（不使用图边）", color: "var(--series-3)" },
    { label: "物理图边展开", color: "var(--series-2)" }
  ]);
}

function drawLane(svg, items, y, actualLane) {
  const gap = 22;
  const boxWidth = Math.min(190, (900 - gap * (items.length - 1)) / items.length);
  const total = boxWidth * items.length + gap * (items.length - 1);
  const start = (1000 - total) / 2;
  items.forEach((item, index) => {
    const x = start + index * (boxWidth + gap);
    let boxClass = "lane-box";
    if (item.kind === "rank") boxClass = "lane-box-rank";
    if (item.kind === "graph") boxClass = "lane-box-graph";
    svg.appendChild(el("rect", { x, y, width: boxWidth, height: 54, rx: 10, class: boxClass }));
    svg.appendChild(el("text", { x: x + boxWidth / 2, y: y + 31, class: "lane-text" }, item.label));
    if (index < items.length - 1) {
      const graphEdge = actualLane && items[index + 1].kind === "graph";
      svg.appendChild(el("line", {
        x1: x + boxWidth + 3, y1: y + 27,
        x2: x + boxWidth + gap - 4, y2: y + 27,
        class: graphEdge ? "route-line-graph" : "route-line"
      }));
    }
  });
}

function renderCompression(controls, plot) {
  const compression = trace.prepared_context.compression || {};
  const scores = compression.scores || [];
  if (!scores.length) {
    plot.innerHTML = `<div class="empty">候选数量未超过预算，因此没有压缩评分明细。</div>`;
    document.getElementById("detail").innerHTML =
      `<strong>${compression.reason || "未执行压缩"}</strong> · 最终缓存：` +
      `${trace.evaluation_overlay.prepared_memory_ids.join(", ")}`;
    setLegend([]);
    return;
  }
  const maxScore = Math.max(...scores.map(item => Number(item.score)), 0.001);
  const rows = scores.slice(0, 14);
  const svg = createSvg("Prepared-cache candidate scores and selection", 50 + rows.length * 30);
  rows.forEach((item, index) => {
    const y = 24 + index * 30;
    const width = 380 * Number(item.score) / maxScore;
    const semanticLabel = `${item.rank}. ${shortText(localized(item.summary), 52)}`;
    svg.appendChild(el("text", { x: 10, y: y + 13, class: "node-label" }, semanticLabel));
    svg.appendChild(el("rect", { x: 430, y, width: 380, height: 17, rx: 4, class: "bar-bg" }));
    svg.appendChild(el("rect", {
      x: 430, y, width, height: 17, rx: 4,
      class: item.selected ? "selected-bar" : "rejected-bar"
    }));
    svg.appendChild(el("text", { x: 820, y: y + 13, class: "annotation" }, Number(item.score).toFixed(3)));
    const labels = [
      item.selected ? "已准备" : "已丢弃",
      goldIds.has(item.id) ? "GOLD" : ""
    ].filter(Boolean).join(" · ");
    svg.appendChild(el("text", { x: 875, y: y + 13, class: "node-label" }, labels));
  });
  plot.appendChild(svg);
  document.getElementById("detail").innerHTML =
    `<strong>预算 ${compression.budget}</strong> · ${compression.candidate_count} 个候选 → ` +
    `${compression.final_count} 条预备记忆 · 是否使用真实问题：${compression.uses_actual_query ? "是" : "否"}`;
  setLegend([
    { label: "保留", color: "var(--series-2)" },
    { label: "丢弃", color: "var(--series-5)" }
  ]);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  })[char]);
}

function shortText(value, maxLength) {
  const text = String(value || "").replace(/\s+/g, " ").trim();
  return text.length <= maxLength ? text : `${text.slice(0, maxLength - 1)}…`;
}

function localized(value) {
  const text = String(value || "");
  return localization[text] || text;
}

function graphStageLabel(stageId) {
  return {
    history_structure: "1. 历史结构",
    memory_attachment: "2. 记忆挂接",
    entity_linking: "3. 实体连接",
    temporal_chain: "4. 时间链",
    similarity_links: "5. 相似度连接"
  }[stageId] || stageId;
}

function ontologyLabel(value) {
  return {
    Intent: "意图",
    UserGoal: "用户目标",
    Idea: "想法",
    Paper: "论文",
    Claim: "论点",
    Evidence: "证据",
    Topic: "主题",
    Gap: "缺口",
    contradicts: "矛盾关系"
  }[value] || value;
}

function nodeTypeLabel(value) {
  return {
    TurnNode: "对话轮次",
    SegmentNode: "会话段",
    MemoryNode: "记忆",
    EntityNode: "实体",
    IntentNode: "意图"
  }[value] || value;
}

function stageMark(hit) {
  return `<td class="text-center"><span class="stage-mark ${hit ? "stage-hit" : "stage-miss"}">` +
    `${hit ? "✓" : "—"}</span></td>`;
}

function supportStatusLabel(value) {
  return {
    sufficient: "充分",
    partial: "部分支持",
    insufficient: "不足"
  }[value] || value || "未知";
}

function gapTypeLabel(value) {
  return {
    evidence_gap: "证据缺口",
    coverage_gap: "覆盖缺口",
    conflict_gap: "冲突缺口",
    freshness_gap: "时效缺口",
    personalization_gap: "个性化缺口",
    definition_gap: "定义缺口"
  }[value] || value || "未知";
}

function appendSemanticTable(container, rows) {
  if (!rows.length) return;
  const wrapper = document.createElement("div");
  wrapper.className = "table-wrap";
  const table = document.createElement("table");
  table.innerHTML = `
    <thead><tr><th>状态</th><th>角色</th><th>语义内容</th></tr></thead>
    <tbody>${rows.map(row => `
      <tr>
        <td><span class="status ${escapeHtml(row.statusClass || "")}">${escapeHtml(row.status)}</span></td>
        <td>${escapeHtml(row.role)}</td>
        <td class="semantic-text">${escapeHtml(row.summary)}</td>
      </tr>`).join("")}</tbody>`;
  wrapper.appendChild(table);
  container.appendChild(wrapper);
}

render();
</script>
</body>
